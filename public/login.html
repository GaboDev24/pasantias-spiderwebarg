<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spider-Web ARG | Login</title>
  <link rel="stylesheet" href="/css/styles.css?v=2">
  <link rel="stylesheet" href="/css/tactical.css?v=2">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body class="tac-page">
  <div class="sw-scanlines"></div>
  <div class="noise-overlay"></div>

  <nav class="sw-nav scrolled">
    <div class="sw-nav__inner">
      <a href="/" style="display: flex; align-items: center;"><img src="/img/logo blanco.png" alt="Spider-Web Logo" style="height: 35px;"></a>
      <div class="sw-nav__links">
        <a href="/" class="sw-nav__link">← Inicio</a>
        <a href="/register.html" class="sw-nav__link">Registro</a>
      </div>
      <div class="sw-nav__controls">
        <button id="theme-toggle" class="sw-theme-btn" onclick="window.app.toggleTheme()" title="Cambiar tema" aria-label="Cambiar tema"><i class="fa-solid fa-sun"></i></button>
        <button id="sw-hamburger" class="sw-hamburger" aria-label="Menú" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <div class="sw-auth-wrap">
    <div class="sw-auth-panel">
      <div class="sw-auth-header">
        <div class="sw-auth-dot r"></div>
        <div class="sw-auth-dot y"></div>
        <div class="sw-auth-dot g"></div>
        <span style="margin-left: 10px; font-family: var(--sw-font-m); font-size: 0.6rem; color: rgba(163,0,0,0.8); letter-spacing: 0.2em;">INICIO DE SESIÓN</span>
      </div>
      <div class="sw-auth-body">
        <h2 style="font-family: var(--sw-font-h); font-size: 2.2rem; color: var(--sw-white); text-transform: uppercase; margin-bottom: 1.5rem; text-align: center;">Acceso al Sistema</h2>
        
        <form id="login-form">
          <div class="sw-input-group">
            <label class="sw-label">Correo Electrónico</label>
            <input type="email" id="email" class="sw-input" required autocomplete="email">
          </div>
          <div class="sw-input-group">
            <label class="sw-label">Contraseña</label>
            <div style="position: relative;">
              <input type="password" id="password" class="sw-input" required autocomplete="current-password" style="padding-right: 40px;">
              <button type="button" tabindex="-1" onclick="window.app.togglePassword('password', this.querySelector('i'))" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--sw-text-muted); cursor: pointer; padding: 0;">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="sw-btn sw-btn--primary sw-btn--full" style="margin-top: 1rem;">INICIAR SESIÓN</button>
        </form>
        <p style="text-align:center; margin-top: 1.5rem; font-family: var(--sw-font-m); font-size: 0.7rem; color: var(--sw-text-muted);">
          ¿No tienes cuenta? <a href="/register.html" style="color: var(--sw-red); text-decoration: none;">Regístrate</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('success') === 'email_verificado') {
        window.app.showToast('Email verificado. Ya puedes iniciar sesión.');
      }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = e.target.querySelector('button');

      btn.innerText = 'VERIFICANDO...';
      btn.disabled = true;

      try {
        const res = await window.api.fetch('/auth/login', {
          method: 'POST',
          body: { email, password }
        });

        localStorage.setItem('sw_token', res.token);
        localStorage.setItem('sw_user', JSON.stringify(res.user));

        if (res.user.role === 'admin' || res.user.role === 'ceo') {
          window.location.href = '/admin.html';
        } else {
          window.location.href = '/dashboard.html';
        }
      } catch (err) {
        window.app.showToast(err.message, true);
        btn.innerText = 'INICIAR SESIÓN';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
