<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spider-Web ARG | Registro de Pasantías</title>
  <link rel="stylesheet" href="/css/styles.css?v=2">
  <link rel="stylesheet" href="/css/tactical.css?v=2">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/index.css?v=2">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body class="tac-page">
  <div class="sw-scanlines"></div>
  <div class="noise-overlay"></div>

  <!-- HUD Corners -->
  <div class="hud-corner hud-tl"><div class="hud-line h"></div><div class="hud-line v"></div></div>
  <div class="hud-corner hud-tr"><div class="hud-line h"></div><div class="hud-line v" style="right:0; left:auto;"></div></div>
  <div class="hud-corner hud-bl"><div class="hud-line h" style="bottom:0; top:auto;"></div><div class="hud-line v"></div></div>
  <div class="hud-corner hud-br"><div class="hud-line h" style="bottom:0; top:auto;"></div><div class="hud-line v" style="right:0; left:auto;"></div></div>

  <nav class="sw-nav">
    <div class="sw-nav__inner">
      <div style="display: flex; align-items: center; gap: 10px;">
        <a href="/" style="display: flex; align-items: center;" class="nav-logo-container"><img src="/img/logo blanco.png" alt="Spider-Web Logo" class="nav-logo" style="height: 35px; transition: all 0.3s ease;"></a>
      </div>
      <div class="sw-nav__links">
        <a href="https://spiderwebargapi.com.ar/" class="sw-nav__link" target="_blank" style="color: var(--sw-red); font-weight: bold;"><i class="fa-solid fa-server" style="margin-right: 5px;"></i> Servicio API</a>
        <a href="#news" class="sw-nav__link">Noticias</a>
        <a href="#projects" class="sw-nav__link">Proyectos</a>
        <div class="sw-nav__sep"></div>
        <a href="/login.html" class="sw-nav__link guest-only">Acceso</a>
        <a href="/register.html" class="sw-nav__link guest-only">Registro</a>
        <a href="/dashboard.html" class="sw-nav__link auth-only" style="display:none;">Dashboard</a>
        <a href="/admin.html" class="sw-nav__link admin-only" style="display:none; color: var(--sw-red);">Panel Admin</a>
        <a href="#" onclick="window.app.logout(); return false;" class="sw-nav__link auth-only" style="display:none;">Salir</a>
      </div>
      <div class="sw-nav__controls">
        <button id="theme-toggle" class="sw-theme-btn" onclick="window.app.toggleTheme()" title="Cambiar tema" aria-label="Cambiar tema"><i class="fa-solid fa-sun"></i></button>
        <button id="sw-hamburger" class="sw-hamburger" aria-label="Menú" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <header class="hero-tac">
    <div class="hero-tac__inner" style="display: flex; flex-direction: column; align-items: center; text-align: center;">
      <img src="/img/logo blanco.png" alt="Spider-Web Logo" style="height: 120px; margin-bottom: 2rem;">
      <h1 class="hero-headline">
        <span class="headline-line1">COMUNIDAD</span>
        <span class="headline-line3">SPIDER-WEB ARG</span>
      </h1>
    </div>
  </header>

  <main class="content-section">
    <!-- Proyectos Realizados (Portfolio) -->
    <section id="portfolio" style="margin-bottom: 5rem; display: none;">
      <h2 class="section-title">Proyectos Realizados</h2>
      <div class="features-grid-tac" id="portfolio-grid">
        <!-- Renderizado por JS -->
      </div>
    </section>

    <!-- Proyectos -->
    <section id="projects" style="margin-bottom: 5rem; display: none;">
      <h2 class="section-title">Propuestas de Proyectos</h2>
      <div class="features-grid-tac" id="projects-grid">
        <!-- Renderizado por JS -->
      </div>
    </section>

    <!-- Noticias -->
    <section id="news">
      <h2 class="section-title">Últimas Noticias</h2>
      <div class="features-grid-tac" id="news-grid">
        <!-- Renderizado por JS -->
      </div>
    </section>
  </main>

  <footer class="sw-footer">
    <div class="sw-footer__inner">
      <span class="sw-footer__copy">© 2026 SPIDER-WEB ARG. TODOS LOS DERECHOS RESERVADOS.</span>
      <div class="sw-footer__status">
        <span class="sw-pulse"></span> Sistema en línea
      </div>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const newsGrid = document.getElementById('news-grid');
      const projGrid = document.getElementById('projects-grid');
      const portGrid = document.getElementById('portfolio-grid');
      const isAuth = !!localStorage.getItem('sw_user');

      // Mostrar sección de propuestas solo si está autenticado
      if (isAuth) {
        document.getElementById('projects').style.display = 'block';
      }

      // Mostrar estado de carga
      const loadingMsg = '<p style="color: rgba(255,255,255,0.3); padding: 2rem; font-family: var(--sw-font-m); font-size: 0.75rem; letter-spacing: 0.1em;">CARGANDO...</p>';
      newsGrid.innerHTML = loadingMsg;
      if (isAuth) projGrid.innerHTML = loadingMsg;
      portGrid.innerHTML = loadingMsg;

      try {
        const promises = [
          window.api.fetch('/public/news'),
          window.api.fetch('/public/portfolio')
        ];
        
        if (isAuth) {
          promises.push(window.api.fetch('/public/projects'));
        }

        const resArray = await Promise.all(promises);
        const newsRes = resArray[0];
        const portRes = resArray[1];
        const projectsRes = isAuth ? resArray[2] : null;

        // Render Portfolio
        const portfolio = portRes.portfolio || [];
        if (portfolio.length > 0) {
          document.getElementById('portfolio').style.display = 'block';
          portGrid.innerHTML = portfolio.map(p => `
            <article class="feature-dossier">
              ${p.cover_url ? `<img src="${p.cover_url}" class="dossier-image" alt="Cover">` : ''}
              <div class="dossier-meta">FECHA: ${new Date(p.created_at).toLocaleDateString('es-AR')} — REALIZADO</div>
              <h3 class="dossier-title">${p.title}</h3>
              <p class="dossier-desc">${p.description}</p>
            </article>
          `).join('');
        }

        // Render Noticias
        const news = newsRes.news || [];
        if (news.length === 0) {
          newsGrid.innerHTML = '<p style="color: rgba(255,255,255,0.4); padding: 2rem; font-family: var(--sw-font-m); font-size: 0.75rem;">No hay noticias publicadas.</p>';
        } else {
          newsGrid.innerHTML = news.map(n => `
            <article class="feature-dossier">
              ${n.cover_url ? `<img src="${n.cover_url}" class="dossier-image" alt="Cover">` : ''}
              <div class="dossier-meta">${new Date(n.created_at).toLocaleDateString('es-AR')} — AUTOR: ${n.author}</div>
              <h3 class="dossier-title">${n.title}</h3>
              <p class="dossier-desc">${n.content.substring(0, 120)}...</p>
              <button class="sw-btn sw-btn--ghost sw-btn--sm" onclick="window.open('/news.html?id=${n.id}', '_blank')">LEER INFORME</button>
            </article>
          `).join('');
        }

        // Render Proyectos
        if (isAuth && projectsRes) {
          const projects = projectsRes.projects || [];
          if (projects.length === 0) {
            projGrid.innerHTML = '<p style="color: rgba(255,255,255,0.4); padding: 2rem; font-family: var(--sw-font-m); font-size: 0.75rem;">No hay proyectos disponibles.</p>';
          } else {
            projGrid.innerHTML = projects.map(p => `
              <article class="feature-dossier">
                <div class="dossier-meta">ESTADO: ${p.status.toUpperCase()}</div>
                <h3 class="dossier-title">${p.title}</h3>
                <div class="tags-list">
                  ${(p.required_tags || []).map(t => `<span class="tag-item">${t}</span>`).join('')}
                </div>
                <p class="dossier-desc">${p.description.substring(0, 120)}...</p>
                <button class="sw-btn sw-btn--primary sw-btn--sm" onclick="window.open('/project.html?id=${p.id}', '_blank')">VER DETALLES</button>
              </article>
            `).join('');
          }
        }

      } catch (err) {
        console.error('Error cargando datos:', err);
        newsGrid.innerHTML = '<p style="color: #f87171; padding: 2rem; font-family: var(--sw-font-m); font-size: 0.75rem;">Error cargando noticias.</p>';
        if (isAuth) projGrid.innerHTML = '<p style="color: #f87171; padding: 2rem; font-family: var(--sw-font-m); font-size: 0.75rem;">Error cargando proyectos.</p>';
        portGrid.innerHTML = '<p style="color: #f87171; padding: 2rem; font-family: var(--sw-font-m); font-size: 0.75rem;">Error cargando portfolio.</p>';
      }
    });
  </script>
</body>
</html>
